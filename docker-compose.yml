services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
    container_name: social_network_php
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: 1
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - social_network

  nginx:
    image: nginx:1.27-alpine
    container_name: social_network_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost/login.html"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - social_network

  mysql:
    image: mysql:8.0
    container_name: social_network_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: ${DB_DATABASE:-social_network}
      MYSQL_USER: ${DB_USERNAME:-social_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-social_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      social_network:
        aliases:
          - chatbot-db

  redis:
    image: redis:7-alpine
    container_name: social_network_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - social_network

  websocket:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
    container_name: social_network_websocket
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      WEBSOCKET_HOST: 0.0.0.0
      WEBSOCKET_PORT: 8081
    command: php /var/www/html/websocket-server.php
    volumes:
      - ./:/var/www/html
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - social_network

  queue_worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
    container_name: social_network_queue
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
    command: php /var/www/html/queue-worker.php
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - social_network

volumes:
  mysql_data:
  redis_data:

networks:
  social_network:
    driver: bridge
