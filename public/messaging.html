<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Social Network</title>`n    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="feed.html" class="nav-brand">Social Network</a>
            <div class="nav-links">
                <a href="feed.html">Feed</a>
                <a href="search.html">Search</a>
                <a href="messaging.html" class="active">Messages <span id="msg-badge" class="badge"></span></a>
                <a href="notifications.html">Notifications <span id="notif-badge" class="badge"></span></a>
                <a href="javascript:void(0)" id="my-profile-link">Profile</a>
                <a href="javascript:void(0)" onclick="logout()">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="messaging-layout">
            <!-- Conversations List -->
            <div class="conversations-sidebar">
                <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
                    <h3 style="margin:0;">Messages</h3>
                    <button id="new-chat-btn" class="btn btn-secondary btn-sm" type="button" style="width:auto;padding:6px 10px;">New Chat</button>
                </div>
                <div id="new-chat-panel" style="display:none;margin-top:10px;border:1px solid #e5e7eb;border-radius:10px;background:#fff;max-height:220px;overflow:auto;"></div>
                <div id="conversations-list"></div>
            </div>

            <!-- Chat Area -->
            <div class="chat-area">
                <div id="chat-empty" class="chat-empty">
                    Select a conversation to start messaging
                </div>

                <div id="chat-container" style="display: none;">
                    <div class="chat-header" id="chat-header"></div>
                    <div class="chat-messages" id="chat-messages"></div>
                    <div id="chat-locked" style="display:none;padding:14px 16px;background:#fff8e1;border-top:1px solid #ffe082;color:#795548;font-size:13px;text-align:center;">
                        ?? You need to follow each other to send messages.
                    </div>
                    <div class="chat-input" id="chat-input-area">
                        <div id="send-error" style="display:none;color:#e74c3c;font-size:12px;padding:4px 10px;"></div>
                        <form id="send-message-form">
                            <input type="text" id="message-input" placeholder="Type a message..." required>
                            <button type="submit" class="btn btn-primary">Send</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        const WS_URL = 'ws://' + window.location.hostname + ':8081';
        let token = localStorage.getItem('token');
        let currentUser = JSON.parse(localStorage.getItem('user') || '{}');
        let ws = null;
        let currentConversation = null;
        let lastMessageId = 0;
        let mutualUsers = [];
        let mutualUsersById = new Map();

        if (!token) { window.location.href = 'login.html'; }

        if (currentUser.username) {
            const pl = document.getElementById('my-profile-link');
            if (pl) pl.href = `profile.html?username=${currentUser.username}`;
        }

        async function apiCall(endpoint, options = {}) {
            const headers = {
                'Authorization': `Bearer ${token}`,
                ...options.headers
            };

            const response = await fetch(`${API_URL}${endpoint}`, {
                ...options,
                headers
            });

            if (response.status === 401) {
                logout();
                return null;
            }

            return response.json();
        }

        function logout() {
            if (ws) ws.close();
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        // Initialize WebSocket connection
        function connectWebSocket() {
            ws = new WebSocket(`${WS_URL}?token=${token}`);

            ws.onopen = () => {
                console.log('WebSocket connected');
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                console.log('WebSocket message:', data);

                if (data.type === 'message' && currentConversation && data.sender_id == currentConversation.id) {
                    appendMessage(data.sender_id, data.content, false);
                } else if (data.type === 'message_sent') {
                    // Message sent confirmation
                } else if (data.type === 'typing' && currentConversation && data.user_id == currentConversation.id) {
                    // Show typing indicator
                }

                // Refresh conversations list to update unread counts
                loadConversations();
                updateMsgBadge();
                if (data.type === 'notification') updateNotifBadge();
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };

            ws.onclose = () => {
                console.log('WebSocket disconnected');
                // Reconnect after 3 seconds
                setTimeout(connectWebSocket, 3000);
            };
        }

        function avatarHtml(url, username, size = 40) {
            const initial = (username || '?')[0].toUpperCase();
            if (url) return `<img src="${url}" alt="${escapeHtml(username)}" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;flex-shrink:0;">`;
            return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:#1877f2;color:white;display:flex;align-items:center;justify-content:center;font-size:${Math.floor(size/2.2)}px;font-weight:bold;flex-shrink:0;">${initial}</div>`;
        }

        async function loadMutualUsers() {
            if (!currentUser.id) {
                mutualUsers = [];
                mutualUsersById = new Map();
                renderNewChatPanel();
                return;
            }

            const mutualData = await apiCall(`/users/${currentUser.id}/mutuals?limit=500`);
            const mutuals = (mutualData && mutualData.mutuals) ? mutualData.mutuals : [];

            mutualUsers = mutuals
                .filter(u => Number(u.id) !== Number(currentUser.id))
                .map(u => ({
                    id: Number(u.id),
                    username: u.username,
                    avatar_url: u.avatar_url || ''
                }));

            mutualUsersById = new Map(mutualUsers.map(u => [u.id, u]));
            renderNewChatPanel();
        }

        function renderNewChatPanel() {
            const panel = document.getElementById('new-chat-panel');
            if (!panel) return;

            if (!mutualUsers.length) {
                panel.innerHTML = '<div style="padding:12px;color:#777;font-size:13px;">No mutual follows yet.</div>';
                return;
            }

            panel.innerHTML = mutualUsers.map(u => `
                <button type="button"
                    onclick="startNewChat(${u.id})"
                    style="width:100%;display:flex;align-items:center;gap:10px;padding:10px;border:none;background:#fff;cursor:pointer;text-align:left;border-bottom:1px solid #f3f4f6;">
                    ${avatarHtml(u.avatar_url, u.username, 34)}
                    <span style="font-weight:600;">${escapeHtml(u.username)}</span>
                </button>
            `).join('');
        }

        function toggleNewChatPanel() {
            const panel = document.getElementById('new-chat-panel');
            if (!panel) return;
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }

        async function startNewChat(userId) {
            const u = mutualUsersById.get(Number(userId));
            if (!u) return;
            await openConversation(u.id, u.username, u.avatar_url || '');
            const panel = document.getElementById('new-chat-panel');
            if (panel) panel.style.display = 'none';
        }

        async function loadConversations() {
            const data = await apiCall('/messages/conversations');
            if (data && data.conversations) {
                const list = document.getElementById('conversations-list');
                list.innerHTML = '';
                const visibleConversations = data.conversations.filter(conv => mutualUsersById.has(Number(conv.other_user_id)));

                if (visibleConversations.length === 0) {
                    list.innerHTML = '<div style="padding:20px;color:#888;text-align:center;font-size:14px;">No mutual-follow conversations yet</div>';
                    return;
                }

                visibleConversations.forEach(conv => {
                    const unreadBadge = conv.unread_count > 0 ?
                        `<span class="badge" style="margin-left:auto;">${conv.unread_count}</span>` : '';
                    const isActive = currentConversation && currentConversation.id == conv.other_user_id ? 'active' : '';
                    list.innerHTML += `
                        <div class="conversation-item ${isActive}" onclick="openConversation(${conv.other_user_id}, '${escapeHtml(conv.other_username)}', '${escapeHtml(conv.other_avatar || '')}')">
                            ${avatarHtml(conv.other_avatar, conv.other_username, 42)}
                            <div class="conversation-info">
                                <strong>${escapeHtml(conv.other_username)}</strong>
                                <div class="last-message">${escapeHtml(conv.content || '')}</div>
                            </div>
                            ${unreadBadge}
                        </div>
                    `;
                });
            }
        }

        async function openConversationFromParams() {
            const params = new URLSearchParams(window.location.search);
            const userIdParam = params.get('user_id');
            const usernameParam = params.get('username');

            if (userIdParam) {
                const targetId = Number(userIdParam);
                if (!targetId || !mutualUsersById.has(targetId)) return;
                const targetUser = mutualUsersById.get(targetId);
                await openConversation(targetUser.id, targetUser.username, targetUser.avatar_url || '');
                return;
            }

            if (usernameParam) {
                const normalized = usernameParam.trim().toLowerCase();
                const targetUser = mutualUsers.find(u => (u.username || '').toLowerCase() === normalized);
                if (!targetUser) return;
                await openConversation(targetUser.id, targetUser.username, targetUser.avatar_url || '');
            }
        }

        async function openConversation(userId, username, avatarUrl = '') {
            currentConversation = { id: userId, username: username, avatar: avatarUrl };
            lastMessageId = 0;

            document.getElementById('chat-empty').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            document.getElementById('send-error').style.display = 'none';

            document.getElementById('chat-header').innerHTML = `
                <a href="profile.html?username=${encodeURIComponent(username)}" style="display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;">
                    ${avatarHtml(avatarUrl, username, 38)}
                    <strong>${escapeHtml(username)}</strong>
                </a>
            `;

            // Check mutual follow before allowing send
            const profile = await apiCall(`/users/${encodeURIComponent(username)}`);
            const isMutual = profile && profile.is_following && profile.is_followed_back;
            document.getElementById('chat-input-area').style.display = isMutual ? 'block' : 'none';
            document.getElementById('chat-locked').style.display = isMutual ? 'none' : 'block';

            // Load messages
            const data = await apiCall(`/messages/conversation?user_id=${userId}`);
            if (data && data.messages) {
                const messagesContainer = document.getElementById('chat-messages');
                messagesContainer.innerHTML = '';

                data.messages.reverse().forEach(msg => {
                    appendMessage(msg.sender_id, msg.content, msg.sender_id == currentUser.id, msg.id);
                });
                if (data.messages.length > 0) lastMessageId = data.messages[data.messages.length - 1].id;

                messagesContainer.scrollTop = messagesContainer.scrollHeight;

                await apiCall('/messages/mark-read', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });
                updateMsgBadge();
                loadConversations();
            }
        }

        function appendMessage(senderId, content, isSent, msgId = 0) {
            const messagesContainer = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isSent ? 'message-sent' : 'message-received'}`;
            if (msgId) { messageDiv.dataset.msgId = msgId; lastMessageId = Math.max(lastMessageId, msgId); }
            messageDiv.innerHTML = `<div class="message-bubble">${escapeHtml(content)}</div>`;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        async function pollCurrentConversation() {
            if (!currentConversation || !lastMessageId) return;
            const data = await apiCall(`/messages/conversation?user_id=${currentConversation.id}&after_id=${lastMessageId}`);
            if (data && data.messages && data.messages.length > 0) {
                data.messages.forEach(msg => {
                    appendMessage(msg.sender_id, msg.content, msg.sender_id == currentUser.id, msg.id);
                });
                // Mark as read
                await apiCall('/messages/mark-read', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: currentConversation.id })
                });
                updateMsgBadge();
                loadConversations();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('send-message-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!currentConversation) return;

            const input = document.getElementById('message-input');
            const content = input.value.trim();

            if (!content) return;

            // Send via API
            const response = await fetch(`${API_URL}/messages/send`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    recipient_id: currentConversation.id,
                    content: content
                })
            });

            const errEl = document.getElementById('send-error');

            if (response.ok) {
                const data = await response.json();
                errEl.style.display = 'none';
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'message',
                        recipient_id: currentConversation.id,
                        content: content,
                        message_id: data.message_id
                    }));
                }
                appendMessage(currentUser.id, content, true, data.message_id || 0);
                input.value = '';
            } else if (response.status === 403) {
                const payload = await response.json();
                errEl.textContent = payload.error || 'Mutual follow required to send messages.';
                errEl.style.display = 'block';
                // Hide input, show locked notice
                document.getElementById('chat-input-area').style.display = 'none';
                document.getElementById('chat-locked').style.display = 'block';
            } else {
                const payload = await response.json().catch(() => ({}));
                errEl.textContent = payload.error || 'Failed to send message.';
                errEl.style.display = 'block';
            }
        });

        async function updateNotifBadge() {
            const data = await apiCall('/notifications/unread-count');
            const b = document.getElementById('notif-badge');
            if (b) b.textContent = (data && data.unread_count > 0) ? (data.unread_count > 99 ? '99+' : data.unread_count) : '';
        }

        async function updateMsgBadge() {
            const data = await apiCall('/messages/unread-count');
            const b = document.getElementById('msg-badge');
            if (b) b.textContent = (data && data.unread_count > 0) ? (data.unread_count > 99 ? '99+' : data.unread_count) : '';
        }

        const newChatBtn = document.getElementById('new-chat-btn');
        if (newChatBtn) {
            newChatBtn.addEventListener('click', toggleNewChatPanel);
        }

        // Initialize
        connectWebSocket();
        (async () => {
            await loadMutualUsers();
            await loadConversations();
            await openConversationFromParams();
            updateNotifBadge();
            updateMsgBadge();
        })();

        // Refresh conversations every 10 seconds, poll active chat every 5s
        setInterval(async () => {
            await loadMutualUsers();
            await loadConversations();
        }, 10000);
        setInterval(pollCurrentConversation, 5000);
        setInterval(updateNotifBadge, 60000);
    </script>
</body>
</html>
