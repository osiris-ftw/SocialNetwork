<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Social Network</title>`n    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="feed.html" class="nav-brand">Social Network</a>
            <div class="nav-links">
                <a href="feed.html">Feed</a>
                <a href="search.html">Search</a>
                <a href="messaging.html">Messages <span id="msg-badge" class="badge"></span></a>
                <a href="notifications.html">Notifications <span id="notif-badge" class="badge"></span></a>
                <a href="javascript:void(0)" id="my-profile-link">Profile</a>
                <a href="admin.html" class="active">Admin</a>
                <a href="javascript:void(0)" id="logout-btn" onclick="logout()">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="admin-layout">
            <aside class="admin-sidebar">
                <h3>Admin Panel</h3>
                <a href="#reports" class="admin-nav-link active" data-section="reports">Reports</a>
                <a href="#users" class="admin-nav-link" data-section="users">User Management</a>
                <a href="#stats" class="admin-nav-link" data-section="stats">Statistics</a>
            </aside>

            <main class="admin-content">
                <!-- Reports Section -->
                <section id="reports-section" class="admin-section">
                    <h2>Content Reports</h2>
                    <div class="filters" style="margin: 20px 0;">
                        <select id="status-filter" style="padding: 8px; border: 1px solid #ddd; border-radius: 6px;">
                            <option value="">All Status</option>
                            <option value="pending">Pending</option>
                            <option value="reviewed">Reviewed</option>
                            <option value="resolved">Resolved</option>
                            <option value="dismissed">Dismissed</option>
                        </select>
                        <select id="type-filter" style="padding: 8px; border: 1px solid #ddd; border-radius: 6px; margin-left: 10px;">
                            <option value="">All Types</option>
                            <option value="user">User</option>
                            <option value="post">Post</option>
                            <option value="comment">Comment</option>
                        </select>
                        <button class="btn btn-secondary" onclick="loadReports()" style="margin-left: 10px;">Refresh</button>
                    </div>
                    <div id="reports-list"></div>
                </section>

                <!-- Users Section -->
                <section id="users-section" class="admin-section" style="display: none;">
                    <h2>User Management</h2>
                    <div style="margin: 20px 0;">
                        <input type="text" id="user-search" placeholder="Search by name or email..." 
                               style="padding: 10px; border: 1px solid #ddd; border-radius: 6px; width: 300px;">
                        <button class="btn btn-secondary" onclick="searchUsers()" style="margin-left: 10px;">Search</button>
                    </div>
                    <div id="users-list"></div>
                </section>

                <!-- Stats Section -->
                <section id="stats-section" class="admin-section" style="display: none;">
                    <h2>Platform Statistics</h2>
                    <div id="platform-stats"></div>
                    <h3 style="margin-top: 30px;">Analytics (Last 30 Days)</h3>
                    <div id="analytics-stats"></div>
                </section>
            </main>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        let token = localStorage.getItem('token');
        let currentUser = null;

        if (!token) { window.location.href = 'login.html'; }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        async function apiCall(endpoint, options = {}) {
            const headers = { 'Authorization': `Bearer ${token}`, ...options.headers };
            const response = await fetch(`${API_URL}${endpoint}`, { ...options, headers });
            if (response.status === 401) { logout(); return null; }
            return response.json();
        }

        async function updateNotifBadge() {
            const data = await apiCall('/notifications/unread-count');
            const b = document.getElementById('notif-badge');
            if (b) b.textContent = (data && data.unread_count > 0) ? (data.unread_count > 99 ? '99+' : data.unread_count) : '';
        }

        async function updateMsgBadge() {
            const data = await apiCall('/messages/unread-count');
            const b = document.getElementById('msg-badge');
            if (b) b.textContent = (data && data.unread_count > 0) ? (data.unread_count > 99 ? '99+' : data.unread_count) : '';
        }

        // Fetch current user
        async function fetchCurrentUser() {
            try {
                const response = await fetch(`${API_URL}/users/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = 'login.html';
                    return;
                }

                if (!response.ok) {
                    throw new Error('Failed to fetch user');
                }

                const data = await response.json();
                currentUser = data;

                // Set profile link
                const pl = document.getElementById('my-profile-link');
                if (pl && currentUser.username) pl.href = `profile.html?username=${currentUser.username}`;

                // Check if user is admin
                if (currentUser.role !== 'admin') {
                    alert('Access denied. Admin privileges required.');
                    window.location.href = 'feed.html';
                }
            } catch (error) {
                console.error('Error fetching current user:', error);
            }
        }

        // Badges & init
        updateNotifBadge();
        updateMsgBadge();
        setInterval(updateNotifBadge, 60000);

        // Section navigation
        document.querySelectorAll('.admin-nav-link').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const section = e.target.dataset.section;
                
                // Update active link
                document.querySelectorAll('.admin-nav-link').forEach(l => l.classList.remove('active'));
                e.target.classList.add('active');

                // Show section
                document.querySelectorAll('.admin-section').forEach(s => s.style.display = 'none');
                document.getElementById(`${section}-section`).style.display = 'block';

                // Load section data
                if (section === 'reports') {
                    loadReports();
                } else if (section === 'users') {
                    loadUsers();
                } else if (section === 'stats') {
                    loadStats();
                }
            });
        });

        // Load reports
        async function loadReports() {
            const status = document.getElementById('status-filter').value;
            const type = document.getElementById('type-filter').value;

            let url = `${API_URL}/admin/reports?`;
            if (status) url += `status=${status}&`;
            if (type) url += `content_type=${type}`;

            try {
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to fetch reports');
                }

                const data = await response.json();
                displayReports(data);
            } catch (error) {
                console.error('Error loading reports:', error);
                document.getElementById('reports-list').innerHTML = 
                    '<p class="error-message">Failed to load reports</p>';
            }
        }

        function displayReports(reports) {
            const container = document.getElementById('reports-list');
            
            if (!reports || reports.length === 0) {
                container.innerHTML = '<p style="color: #666; text-align: center; padding: 20px;">No reports found</p>';
                return;
            }

            container.innerHTML = reports.map(report => `
                <div class="report-card">
                    <div class="report-header">
                        <div>
                            <strong>${escapeHtml(report.reporter_name)}</strong> reported 
                            ${report.content_type} by <strong>${escapeHtml(report.reported_name)}</strong>
                            <br>
                            <small style="color: #666;">${new Date(report.created_at).toLocaleString()}</small>
                        </div>
                        <span class="status-badge status-${report.status}">${report.status}</span>
                    </div>
                    <div style="margin: 10px 0;">
                        <strong>Reason:</strong> ${escapeHtml(report.reason)}
                    </div>
                    ${report.content_preview ? `
                        <div style="margin: 10px 0; padding: 10px; background: #f9f9f9; border-radius: 6px;">
                            <strong>Content Preview:</strong><br>
                            ${escapeHtml(report.content_preview.substring(0, 200))}${report.content_preview.length > 200 ? '...' : ''}
                        </div>
                    ` : ''}
                    ${report.status === 'pending' ? `
                        <div style="margin-top: 15px; display: flex; gap: 10px;">
                            <button class="btn btn-secondary" onclick="updateReportStatus(${report.id}, 'reviewed')">
                                Mark as Reviewed
                            </button>
                            <button class="btn btn-secondary" onclick="updateReportStatus(${report.id}, 'resolved')">
                                Resolve
                            </button>
                            <button class="btn btn-secondary" onclick="updateReportStatus(${report.id}, 'dismissed')">
                                Dismiss
                            </button>
                            ${report.content_type === 'user' ? `
                                <button class="btn btn-primary" onclick="banUser(${report.reported_id}, '${escapeHtml(report.reported_name)}')">
                                    Ban User
                                </button>
                            ` : `
                                <button class="btn btn-primary" onclick="deleteContent('${report.content_type}', ${report.content_id})">
                                    Delete ${report.content_type}
                                </button>
                            `}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        async function updateReportStatus(reportId, status) {
            try {
                const response = await fetch(`${API_URL}/admin/reports/${reportId}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status })
                });

                if (!response.ok) {
                    throw new Error('Failed to update report');
                }

                alert('Report status updated successfully');
                loadReports();
            } catch (error) {
                console.error('Error updating report:', error);
                alert('Failed to update report status');
            }
        }

        async function banUser(userId, userName) {
            if (!confirm(`Are you sure you want to ban ${userName}?`)) {
                return;
            }

            const reason = prompt('Enter ban reason:');
            if (!reason) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/admin/users/${userId}/ban`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ reason })
                });

                if (!response.ok) {
                    throw new Error('Failed to ban user');
                }

                alert('User banned successfully');
                loadReports();
            } catch (error) {
                console.error('Error banning user:', error);
                alert('Failed to ban user');
            }
        }

        async function deleteContent(type, id) {
            if (!confirm(`Are you sure you want to delete this ${type}?`)) {
                return;
            }

            const endpoint = type === 'post' ? 'posts' : 'comments';

            try {
                const response = await fetch(`${API_URL}/admin/${endpoint}/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error(`Failed to delete ${type}`);
                }

                alert(`${type} deleted successfully`);
                loadReports();
            } catch (error) {
                console.error(`Error deleting ${type}:`, error);
                alert(`Failed to delete ${type}`);
            }
        }

        // Load users
        async function loadUsers(searchQuery = '') {
            let url = `${API_URL}/admin/users`;
            if (searchQuery) {
                url += `?search=${encodeURIComponent(searchQuery)}`;
            }

            try {
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to fetch users');
                }

                const data = await response.json();
                displayUsers(data);
            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('users-list').innerHTML = 
                    '<p class="error-message">Failed to load users</p>';
            }
        }

        function searchUsers() {
            const query = document.getElementById('user-search').value;
            loadUsers(query);
        }

        function displayUsers(users) {
            const container = document.getElementById('users-list');
            
            if (!users || users.length === 0) {
                container.innerHTML = '<p style="color: #666; text-align: center; padding: 20px;">No users found</p>';
                return;
            }

            container.innerHTML = `
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="background: #f0f2f5;">
                            <th style="padding: 10px; text-align: left;">User</th>
                            <th style="padding: 10px; text-align: left;">Email</th>
                            <th style="padding: 10px; text-align: left;">Joined</th>
                            <th style="padding: 10px; text-align: left;">Status</th>
                            <th style="padding: 10px; text-align: left;">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${users.map(user => `
                            <tr style="border-bottom: 1px solid #e4e6eb;">
                                <td style="padding: 10px;">
                                    <strong>${escapeHtml(user.full_name)}</strong>
                                    ${user.role === 'admin' ? '<span style="color: #1877f2; font-size: 12px;">(Admin)</span>' : ''}
                                </td>
                                <td style="padding: 10px;">${escapeHtml(user.email)}</td>
                                <td style="padding: 10px;">${new Date(user.created_at).toLocaleDateString()}</td>
                                <td style="padding: 10px;">
                                    ${user.is_banned ? 
                                        '<span style="color: #ff4444;">Banned</span>' : 
                                        '<span style="color: #4caf50;">Active</span>'}
                                </td>
                                <td style="padding: 10px;">
                                    ${user.role !== 'admin' ? (
                                        user.is_banned ?
                                            `<button class="btn btn-secondary" onclick="unbanUser(${user.id}, '${escapeHtml(user.full_name)}')">Unban</button>` :
                                            `<button class="btn btn-primary" onclick="banUser(${user.id}, '${escapeHtml(user.full_name)}')">Ban</button>`
                                    ) : 'N/A'}
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function unbanUser(userId, userName) {
            if (!confirm(`Are you sure you want to unban ${userName}?`)) {
                return;
            }

            try {
                const response = await fetch(`${API_URL}/admin/users/${userId}/unban`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to unban user');
                }

                alert('User unbanned successfully');
                loadUsers();
            } catch (error) {
                console.error('Error unbanning user:', error);
                alert('Failed to unban user');
            }
        }

        // Load statistics
        async function loadStats() {
            try {
                const [statsResponse, analyticsResponse] = await Promise.all([
                    fetch(`${API_URL}/admin/stats`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    }),
                    fetch(`${API_URL}/admin/analytics?days=30`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    })
                ]);

                if (!statsResponse.ok || !analyticsResponse.ok) {
                    throw new Error('Failed to fetch statistics');
                }

                const stats = await statsResponse.json();
                const analytics = await analyticsResponse.json();

                displayStats(stats, analytics);
            } catch (error) {
                console.error('Error loading stats:', error);
                document.getElementById('platform-stats').innerHTML = 
                    '<p class="error-message">Failed to load statistics</p>';
            }
        }

        function displayStats(stats, analytics) {
            // Platform Stats
            document.getElementById('platform-stats').innerHTML = `
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px;">
                    <div style="background: #f0f2f5; padding: 20px; border-radius: 8px; text-align: center;">
                        <div style="font-size: 32px; font-weight: bold; color: #1877f2;">${stats.total_users || 0}</div>
                        <div style="color: #666; margin-top: 5px;">Total Users</div>
                    </div>
                    <div style="background: #f0f2f5; padding: 20px; border-radius: 8px; text-align: center;">
                        <div style="font-size: 32px; font-weight: bold; color: #1877f2;">${stats.total_posts || 0}</div>
                        <div style="color: #666; margin-top: 5px;">Total Posts</div>
                    </div>
                    <div style="background: #f0f2f5; padding: 20px; border-radius: 8px; text-align: center;">
                        <div style="font-size: 32px; font-weight: bold; color: #1877f2;">${stats.total_comments || 0}</div>
                        <div style="color: #666; margin-top: 5px;">Total Comments</div>
                    </div>
                    <div style="background: #f0f2f5; padding: 20px; border-radius: 8px; text-align: center;">
                        <div style="font-size: 32px; font-weight: bold; color: #ff4444;">${stats.pending_reports || 0}</div>
                        <div style="color: #666; margin-top: 5px;">Pending Reports</div>
                    </div>
                </div>
            `;

            // Analytics
            if (analytics && analytics.daily_stats) {
                const dailyStats = analytics.daily_stats;
                document.getElementById('analytics-stats').innerHTML = `
                    <div style="margin-top: 20px;">
                        <h4>User Activity (Last 30 Days)</h4>
                        <table style="width: 100%; margin-top: 10px; border-collapse: collapse;">
                            <thead>
                                <tr style="background: #f0f2f5;">
                                    <th style="padding: 10px; text-align: left;">Date</th>
                                    <th style="padding: 10px; text-align: right;">Logins</th>
                                    <th style="padding: 10px; text-align: right;">Posts</th>
                                    <th style="padding: 10px; text-align: right;">Comments</th>
                                    <th style="padding: 10px; text-align: right;">Messages</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${dailyStats.slice(0, 10).map(day => `
                                    <tr style="border-bottom: 1px solid #e4e6eb;">
                                        <td style="padding: 10px;">${day.date}</td>
                                        <td style="padding: 10px; text-align: right;">${day.login || 0}</td>
                                        <td style="padding: 10px; text-align: right;">${day.post_created || 0}</td>
                                        <td style="padding: 10px; text-align: right;">${day.comment_created || 0}</td>
                                        <td style="padding: 10px; text-align: right;">${day.message_sent || 0}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Add filter change listeners
        document.getElementById('status-filter').addEventListener('change', loadReports);
        document.getElementById('type-filter').addEventListener('change', loadReports);

        // Initialize
        fetchCurrentUser().then(() => {
            loadReports();
        });
    </script>
</body>
</html>
